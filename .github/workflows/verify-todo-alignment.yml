name: Verify TODO issue alignment

on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.mjs'
      - 'scripts/verify-todo-issue-alignment.mjs'
  push:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.mjs'
      - 'scripts/verify-todo-issue-alignment.mjs'

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install GitHub CLI
        run: command -v gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && sudo apt update && sudo apt install gh -y)
      - name: Run TODO verification (human)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/verify-todo-issue-alignment.mjs
      - name: Run TODO verification (json)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/verify-todo-issue-alignment.mjs --json > todo-verify.json
      - name: Upload verification artifact
        uses: actions/upload-artifact@v6
        with:
          name: todo-issue-alignment
          path: todo-verify.json
      - name: Fail on issues
        run: |
          status=$(jq -r '.status' todo-verify.json || echo 'fail')
          if [ "$status" != "pass" ]; then
            echo 'TODO issue alignment check failed'
            jq '.errors' todo-verify.json || cat todo-verify.json
            exit 1
          fi
